<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<title>AI Sentiment Analyzer</title>

<link rel="icon" type="image/x-icon" href="favicon.ico">

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

*{
box-sizing:border-box;
margin:0;
padding:0;
}

body{

font-family:'Poppins',sans-serif;
min-height:100vh;

background:linear-gradient(270deg,#0f172a,#1e3a8a,#0ea5e9,#22c55e);
background-size:600% 600%;
animation:bgMove 18s infinite;

display:flex;
justify-content:center;
align-items:center;
padding:20px;
}

@keyframes bgMove{

0%{background-position:0% 50%}
50%{background-position:100% 50%}
100%{background-position:0% 50%}

}

.container{

width:100%;
max-width:1100px;

background:rgba(255,255,255,0.08);
backdrop-filter:blur(15px);

border-radius:18px;

padding:40px;

box-shadow:0 25px 60px rgba(0,0,0,0.45);

animation:fadeIn 1.2s ease;

}

@keyframes fadeIn{

from{opacity:0;transform:translateY(20px)}
to{opacity:1;transform:translateY(0)}

}

.header{

display:flex;
align-items:center;
gap:15px;
margin-bottom:25px;

}

.logo{

width:60px;
animation:float 3s ease-in-out infinite;

}

@keyframes float{

0%{transform:translateY(0)}
50%{transform:translateY(-8px)}
100%{transform:translateY(0)}

}

.title{

font-family:'Orbitron',sans-serif;
font-size:32px;
color:white;

}

.subtitle{

color:#cbd5f5;
font-size:14px;

}

input[type=file]{

margin-top:12px;
padding:10px;

border-radius:8px;
border:none;

background:#e2e8f0;

}

button{

background:linear-gradient(135deg,#3b82f6,#2563eb);

border:none;

color:white;

padding:12px 24px;

margin:12px 8px;

border-radius:10px;

font-weight:500;

cursor:pointer;

transition:all .3s;

}

button:hover{

transform:translateY(-3px);
box-shadow:0 10px 20px rgba(0,0,0,.3);

}

textarea{

width:100%;

height:110px;

margin-top:20px;

border-radius:10px;

padding:12px;

border:none;

font-size:15px;

}

.status{

margin-top:12px;

font-weight:500;

color:#a5b4fc;

}

.results{

display:grid;

grid-template-columns:1fr 1fr;

gap:20px;

margin-top:35px;

}

.card{

background:rgba(255,255,255,.15);

border-radius:14px;

padding:22px;

color:white;

backdrop-filter:blur(10px);

transition:0.3s;

}

.card:hover{

transform:translateY(-5px);
box-shadow:0 10px 25px rgba(0,0,0,.35);

}

.modelTitle{

font-family:'Orbitron',sans-serif;

margin-bottom:8px;

}

.conf{

margin-top:10px;
font-size:18px;

}

.chartBox{

margin-top:35px;

background:rgba(255,255,255,.1);

padding:20px;

border-radius:14px;

}

footer{

margin-top:25px;

text-align:center;

color:#cbd5f5;

font-size:13px;

}

@media(max-width:800px){

.results{

grid-template-columns:1fr;

}

.container{

padding:25px;

}

.title{

font-size:24px;

}

button{

width:100%;

margin:8px 0;

}

}

</style>

</head>


<body>


<div class="container">


<div class="header">

<img src="logo.png" class="logo">

<div>

<div class="title">AI Text Sentiment Analyzer</div>

<div class="subtitle">Amogh Samarth — CM23034</div>

</div>

</div>


<input type="file" id="csvFile">

<br>

<button onclick="loadCSV()">Upload Dataset</button>
<button onclick="trainModels()">Train Model</button>

<div id="status" class="status">Waiting for dataset...</div>


<textarea id="sentence" placeholder="Type a sentence for sentiment analysis"></textarea>

<button onclick="predict()">Analyze Sentiment</button>


<div class="results">

<div class="card">

<div class="modelTitle">RNN Model</div>

<div id="rnnResult">-</div>

<div class="conf" id="rnnConf"></div>

</div>

<div class="card">

<div class="modelTitle">Dense Model</div>

<div id="denseResult">-</div>

<div class="conf" id="denseConf"></div>

</div>

</div>


<div class="chartBox">

<canvas id="chart"></canvas>

</div>

<footer>

AI Powered Sentiment Analysis Interface

</footer>


</div>


<script>

let texts=[]
let labels=[]
let tokenizer={}
let wordIndex=1

let rnnModel
let denseModel

function loadCSV(){

const file=document.getElementById("csvFile").files[0]

texts=[]
labels=[]
tokenizer={}
wordIndex=1

Papa.parse(file,{
header:true,
skipEmptyLines:true,
complete:function(results){

results.data.forEach(row=>{

if(row.text && row.label!==undefined){

texts.push(row.text.trim())
labels.push(Number(row.label))

}

})

buildTokenizer()

document.getElementById("status").innerHTML=
"Dataset Loaded ("+texts.length+" samples)"

}
})

}

function buildTokenizer(){

texts.forEach(sentence=>{

sentence.split(/[\s,.!?]+/).forEach(word=>{

word=word.toLowerCase()

if(!tokenizer[word]){
tokenizer[word]=wordIndex++
}

})

})

}

function encode(sentence){

return sentence
.toLowerCase()
.split(/[\s,.!?]+/)
.map(w=>tokenizer[w] || 0)

}

function pad(seq){

const max=10

while(seq.length<max)
seq.push(0)

return seq.slice(0,max)

}

async function trainModels(){

document.getElementById("status").innerHTML="Training models..."

const xs=tf.tensor2d(texts.map(t=>pad(encode(t))))
const ys=tf.tensor2d(labels,[labels.length,1])

rnnModel=tf.sequential()

rnnModel.add(tf.layers.embedding({
inputDim:5000,
outputDim:16,
inputLength:10
}))

rnnModel.add(tf.layers.simpleRNN({units:12}))

rnnModel.add(tf.layers.dense({
units:1,
activation:'sigmoid'
}))

rnnModel.compile({
optimizer:'adam',
loss:'binaryCrossentropy',
metrics:['accuracy']
})

denseModel=tf.sequential()

denseModel.add(tf.layers.embedding({
inputDim:5000,
outputDim:16,
inputLength:10
}))

denseModel.add(tf.layers.flatten())

denseModel.add(tf.layers.dense({
units:1,
activation:'sigmoid'
}))

denseModel.compile({
optimizer:'adam',
loss:'binaryCrossentropy'
})

await rnnModel.fit(xs,ys,{epochs:30,batchSize:8})

await denseModel.fit(xs,ys,{epochs:30,batchSize:8})

document.getElementById("status").innerHTML="✔ Model trained successfully"

}

async function predict(){

if(!rnnModel){

alert("Train model first")

return

}

const text=document.getElementById("sentence").value

const input=tf.tensor2d([pad(encode(text))])

const rnn=await rnnModel.predict(input).data()
const dense=await denseModel.predict(input).data()

const rnnValue=isNaN(rnn[0])?0:rnn[0]
const denseValue=isNaN(dense[0])?0:dense[0]

const rnnLabel=rnnValue>0.5?"Positive 😊":"Negative 😞"
const denseLabel=denseValue>0.5?"Positive 😊":"Negative 😞"

document.getElementById("rnnResult").innerHTML=rnnLabel
document.getElementById("denseResult").innerHTML=denseLabel

document.getElementById("rnnConf").innerHTML=
"Confidence: "+(rnnValue*100).toFixed(2)+"%"

document.getElementById("denseConf").innerHTML=
"Confidence: "+(denseValue*100).toFixed(2)+"%"

drawChart(rnnValue,denseValue)

}

function drawChart(rnn,dense){

const ctx=document.getElementById("chart")

new Chart(ctx,{
type:'bar',
data:{
labels:["RNN Model","Dense Model"],
datasets:[{
label:"Confidence",
data:[rnn,dense],
backgroundColor:["#60a5fa","#22c55e"]
}]
},
options:{
responsive:true,
scales:{
y:{beginAtZero:true,max:1}
}
}
})

}

</script>


</body>
</html>
