<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>Text Sentiment Analysis</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

*{
box-sizing:border-box;
margin:0;
padding:0;
}

body{
font-family:'Poppins',sans-serif;
background:linear-gradient(-45deg,#4f46e5,#3b82f6,#22c55e,#06b6d4);
background-size:400% 400%;
animation:gradientBG 12s ease infinite;
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
padding:20px;
}

@keyframes gradientBG{
0%{background-position:0% 50%}
50%{background-position:100% 50%}
100%{background-position:0% 50%}
}

.container{
width:100%;
max-width:950px;
background:rgba(255,255,255,0.9);
backdrop-filter:blur(10px);
padding:40px;
border-radius:16px;
box-shadow:0 15px 40px rgba(0,0,0,0.2);
transition:0.3s;
}

.container:hover{
transform:translateY(-3px);
}

h1{
font-size:32px;
color:#1e3a8a;
margin-bottom:8px;
}

.subtitle{
color:#475569;
margin-bottom:30px;
font-size:15px;
}

input[type=file]{
padding:10px;
border-radius:8px;
border:1px solid #cbd5f5;
background:white;
}

button{
background:linear-gradient(135deg,#2563eb,#1d4ed8);
border:none;
color:white;
padding:12px 22px;
margin:10px 8px;
border-radius:8px;
cursor:pointer;
font-size:15px;
font-weight:500;
transition:all 0.25s ease;
position:relative;
overflow:hidden;
}

button:hover{
transform:translateY(-2px);
box-shadow:0 6px 18px rgba(0,0,0,0.25);
}

button:active{
transform:scale(0.95);
}

textarea{
width:100%;
height:90px;
padding:12px;
border-radius:8px;
border:1px solid #cbd5f5;
font-size:15px;
resize:none;
margin-top:10px;
transition:0.2s;
}

textarea:focus{
outline:none;
border-color:#2563eb;
box-shadow:0 0 8px rgba(37,99,235,0.3);
}

.status{
margin-top:15px;
font-weight:600;
color:#1e40af;
}

.resultBox{
display:flex;
gap:20px;
margin-top:30px;
flex-wrap:wrap;
}

.card{
flex:1;
min-width:250px;
background:linear-gradient(135deg,#eef2ff,#e0f2fe);
padding:22px;
border-radius:12px;
transition:0.25s;
box-shadow:0 6px 16px rgba(0,0,0,0.08);
}

.card:hover{
transform:translateY(-5px);
}

.modelTitle{
font-weight:600;
margin-bottom:10px;
color:#1e3a8a;
font-size:18px;
}

.conf{
font-size:18px;
margin-top:10px;
color:#0f172a;
}

canvas{
margin-top:30px;
max-width:100%;
}

/* Responsive */

@media(max-width:700px){

h1{
font-size:24px;
}

.container{
padding:25px;
}

button{
width:100%;
margin:8px 0;
}

.resultBox{
flex-direction:column;
}

}

</style>

</head>

<body>

<div class="container">

<h1>Text Sentiment Analysis</h1>
<div class="subtitle">Amogh Samarth — CM23034</div>

<input type="file" id="csvFile">

<br>

<button onclick="loadCSV()">Upload CSV</button>
<button onclick="trainModels()">Train Model</button>

<div id="status" class="status">Waiting for dataset...</div>

<br><br>

<textarea id="sentence" placeholder="Enter sentence for sentiment analysis"></textarea>

<br>

<button onclick="predict()">Analyze Sentiment</button>

<div class="resultBox">

<div class="card">
<div class="modelTitle">RNN Model</div>
<div id="rnnResult">-</div>
<div class="conf" id="rnnConf"></div>
</div>

<div class="card">
<div class="modelTitle">Dense Model</div>
<div id="denseResult">-</div>
<div class="conf" id="denseConf"></div>
</div>

</div>

<canvas id="chart"></canvas>

</div>

<script>

let texts=[]
let labels=[]
let tokenizer={}
let wordIndex=1

let rnnModel
let denseModel

function loadCSV(){

const file=document.getElementById("csvFile").files[0]

texts=[]
labels=[]
tokenizer={}
wordIndex=1

Papa.parse(file,{
header:true,
skipEmptyLines:true,
complete:function(results){

results.data.forEach(row=>{

if(row.text && row.label!==undefined){

texts.push(row.text.trim())
labels.push(Number(row.label))

}

})

buildTokenizer()

document.getElementById("status").innerHTML=
"Dataset Loaded ("+texts.length+" samples)"

}
})

}

function buildTokenizer(){

texts.forEach(sentence=>{

sentence.split(/\s+/).forEach(word=>{

word=word.toLowerCase()

if(!tokenizer[word]){
tokenizer[word]=wordIndex++
}

})

})

}

function encode(sentence){

return sentence
.toLowerCase()
.split(/\s+/)
.map(w=>tokenizer[w] || 0)

}

function pad(seq){

const max=10

while(seq.length<max)
seq.push(0)

return seq.slice(0,max)

}

async function trainModels(){

document.getElementById("status").innerHTML="Training models... please wait"

const xs=tf.tensor2d(texts.map(t=>pad(encode(t))))
const ys=tf.tensor2d(labels,[labels.length,1])

rnnModel=tf.sequential()

rnnModel.add(tf.layers.embedding({
inputDim:2000,
outputDim:16,
inputLength:10
}))

rnnModel.add(tf.layers.simpleRNN({units:12}))

rnnModel.add(tf.layers.dense({
units:1,
activation:'sigmoid'
}))

rnnModel.compile({
optimizer:'adam',
loss:'binaryCrossentropy',
metrics:['accuracy']
})

denseModel=tf.sequential()

denseModel.add(tf.layers.embedding({
inputDim:2000,
outputDim:16,
inputLength:10
}))

denseModel.add(tf.layers.flatten())

denseModel.add(tf.layers.dense({
units:1,
activation:'sigmoid'
}))

denseModel.compile({
optimizer:'adam',
loss:'binaryCrossentropy'
})

await rnnModel.fit(xs,ys,{
epochs:10,
batchSize:8
})

await denseModel.fit(xs,ys,{
epochs:10,
batchSize:8
})

document.getElementById("status").innerHTML=
"✔ Model trained successfully"

}

async function predict(){

if(!rnnModel){
alert("Train model first")
return
}

const text=document.getElementById("sentence").value

const input=tf.tensor2d([pad(encode(text))])

const rnn=await rnnModel.predict(input).data()
const dense=await denseModel.predict(input).data()

const rnnLabel=rnn[0]>0.5?"Positive":"Negative"
const denseLabel=dense[0]>0.5?"Positive":"Negative"

document.getElementById("rnnResult").innerHTML=rnnLabel
document.getElementById("denseResult").innerHTML=denseLabel

document.getElementById("rnnConf").innerHTML=
"Confidence: "+(rnn[0]*100).toFixed(2)+"%"

document.getElementById("denseConf").innerHTML=
"Confidence: "+(dense[0]*100).toFixed(2)+"%"

drawChart(rnn[0],dense[0])

}

function drawChart(rnn,dense){

const ctx=document.getElementById("chart")

new Chart(ctx,{
type:'bar',
data:{
labels:["RNN Model","Dense Model"],
datasets:[{
label:"Confidence",
data:[rnn,dense],
backgroundColor:["#3b82f6","#60a5fa"]
}]
},
options:{
responsive:true,
scales:{
y:{
beginAtZero:true,
max:1
}
}
}
})

}

</script>

</body>
</html>
